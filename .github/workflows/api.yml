name: Motor Mutante Proxy

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# /CARRASCO: Mata execuções duplicadas
concurrency:
  group: "mutante-proxy-core"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    # /SOBERANIA: Autorização militar para o bot comitar
    permissions:
      contents: write

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # [ REMOVIDA A EXIGÊNCIA DO REQUIREMENTS.TXT AQUI ]

    - name: /SOMBRA - Instalar Dependências Táticas
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3 pysocks

    - name: Executar Cérebro Separador
      run: python proxy_mutante.py

    - name: /CARRASCO - Subir Arsenal Classificado
      run: |
        git config --global user.name 'Entidade 12'
        git config --global user.email 'bot@imperiomutante.com'
        git add *.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "[AUTO] Arsenal Mutante: Elite, SOCKS5, SOCKS4 e HTTP" && git push)
