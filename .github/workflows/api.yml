name: Motor Mutante Proxy

on:
  schedule:
    - cron: '0 * * * *' # /GLITCH: Relógio cravado para rodar a cada 1 HORA
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: /SOMBRA - Instalar Dependências Táticas
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3 pysocks

    - name: Executar Cérebro Separador
      run: python proxy_mutante.py

    - name: /CARRASCO - Subir Arsenal Classificado
      run: |
        git config --global user.name 'Entidade 12'
        git config --global user.email 'bot@imperiomutante.com'
        git add *.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "[AUTO] Arsenal Renovou: SOCKS5, SOCKS4 e HTTP" && git push)
