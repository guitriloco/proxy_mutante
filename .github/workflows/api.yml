steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências SOBERANIA
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Motor Mutante
        run: python proxy_mutante.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
