name: /MUTAR - Proxy Catcher V5

on:
  schedule:
    - cron: '*/30 * * * *' # Execução implacável a cada meia hora
  workflow_dispatch: # Gatilho manual para execução sob demanda

jobs:
  mutacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Arsenal
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Motor Mutante (Entidade 12)
      run: python proxy_mutante.py
      env:
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

    - name: Persistência de Dados (Corte e Costura)
      run: |
        git config --global user.name "Entidade 12 [Automação]"
        git config --global user.email "entidade12@imperiomutante.bot"
        git add .
        git commit -m "⚙️ /MUTAR V5: Rotação de Frota e Geo-Roteamento sincronizados" || exit 0
        git push
