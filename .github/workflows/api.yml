name: Império Mutante - Motor Proxy

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependências SOBERANIA
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Motor Mutante
        run: python proxy_mutante.py
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Commit and Push Novos Proxies
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add elite.txt http.txt socks4.txt socks5.txt || true
          git commit -m "[AUTO] Arsenal Mutante Atualizado: Proxies Frescos" || echo "Sem alterações para commit"
          git push
